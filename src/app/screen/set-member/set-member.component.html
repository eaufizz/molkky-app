<div class="page-container">
  <app-header
    title="チームを編集"
    (back)="moveToBack()"
    (home)="moveToHome()"
  ></app-header>
  <div class="cards">
    <ng-container *ngFor="let team of currentTeams">
      <app-team-card
        [team]="team"
      ></app-team-card>
    </ng-container>
  </div>
  <div class="buttons">
    <button>
      <span>選手登録</span>
    </button>
    <button>
      <span>プレイ！</span>
    </button>
  </div>
</div>
